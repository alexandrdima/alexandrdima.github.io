
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Табличная верстка</title>
    <style>
        table { width: 100%; border-collapse: collapse; background: #e6f0fa; }
        td { border: 2px solid #0d47a1; padding: 20px; }
        @media (max-width: 600px) { table, tr, td { display: block; } }
    </style>
</head>
<body>
    <table>
        <tr><td colspan="2" style="background: #0d47a1; color: white;">ШАПКА</td></tr>
        <tr>
            <td style="background: white;">ОСНОВНОЙ КОНТЕНТ</td>
            <td style="background: #bbdefb;">САЙДБАР</td>
        </tr>
        <tr><td colspan="2" style="background: #0d47a1; color: white;">ПОДВАЛ</td></tr>
    </table>
</body>
</html>
